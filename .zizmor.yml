# zizmor configuration — https://docs.zizmor.sh/configuration/
#
# Accepted suppressions for intentional, reviewed patterns. Every entry must
# carry a reason so it isn't re-litigated each run. Prefer the narrowest scope
# (file:line) over a whole-file ignore.

rules:
  # pr.yaml intentionally uses `pull_request_target` so gated jobs can run with
  # repo permissions against fork PRs. The known risk is mitigated by the
  # "Fetch trusted configuration files from main branch" step in every job,
  # which overwrites PR-supplied protected config (.editorconfig, Directory.Build.*,
  # *.ruleset, *.globalconfig, *.DotSettings, workflows) with main's versions
  # before any build/analyzer runs. This is a deliberate design, reviewed in the
  # workflow's SECURITY NOTE.
  dangerous-triggers:
    ignore:
      - pr.yaml

  # pr.yaml — the gated jobs check out the PR head by design (that is the code
  # under test) and re-fetch trusted config from main afterwards. codeql.yaml —
  # the flagged expansions are `${{ steps.*.outcome }}` / `steps.*.outputs.*`
  # assigned to pwsh variables in the summary step; step outcomes/outputs are
  # controlled enum values, not untrusted input.
  template-injection:
    ignore:
      - pr.yaml
      - codeql.yaml

  # All actions are pinned to a full commit SHA with an EXACT version-tag comment
  # (e.g. `# v4.37.1`, not a floating `# v4` that drifts as the major tag moves
  # past the pinned SHA). Require hash pins everywhere.
  unpinned-uses:
    config:
      policies:
        "*": hash-pin

  # scorecard.yml — OSSF Scorecard's canonical template declares `read-all` at
  # the top level and elevates only the analysis job (security-events/id-token);
  # read-all is the documented, recommended shape and the write scopes are
  # job-local. coverage-report.yml — a single-job workflow that pushes the
  # generated report to gh-pages, so `contents: write` at the top level is the
  # whole job's scope, not an over-grant.
  excessive-permissions:
    ignore:
      - scorecard.yml
      - coverage-report.yaml

  # release.yaml — softprops/action-gh-release attaches the built .nupkg /
  # coverage artifacts to the GitHub Release; that upload is not something the
  # runner provides on its own.
  superfluous-actions:
    ignore:
      - release.yaml
